<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="Pngs/icon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>班级月刊官网</title>
        <script type="text/javascript">
            (function(c,l,a,r,i,t,y){
                c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
                t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
                y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
            })(window, document, "clarity", "script", "qpgd3dhzpj");

        <style>
            body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
            transition: background-color 0.4s, color 0.4s;
        }
        body.light {
            background-color: #ffffff;
            color: #000000;
        }
        body.dark {
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;
            font-size: 18px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        button:active {
            background-color: #004494;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #000000; 
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .light .slider:before {
            content: url("Pngs/sun_fill.svg"); 
        }
        .dark .slider:before {
            content: url("Pngs/moon_stars_fill.svg"); 
        }
        </style>
    </head>

    <body class="light">
        <nav class="navbar">
            <div>
                <a href="index.html">首页</a>
                <a href="about.html">关于我们</a>
            </div>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
        </nav>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
        <script>
            const toggleSwitch = document.getElementById("theme-toggle");
            toggleSwitch.addEventListener("change", () => {
                document.body.classList.toggle("dark");
                document.body.classList.toggle("light");
            });
        </script>
        <h1>欢迎来到班级月刊官网</h1>
        <button onclick="location.href='https://shequ.codemao.cn/work/252078664'">在线体验</button>
    </body>
</html>
